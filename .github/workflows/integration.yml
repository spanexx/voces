name: Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # We need to install system dependencies for Linux CGO (like x11, xtst, dbus)
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxext-dev libxtst-dev xclip xdotool libayatana-appindicator3-dev

    - name: Run Tests
      run: go test -mod=mod -v -timeout 30s ./...
